name: Automated Developer Diary

on:
  schedule:
    - cron: '50 23 * * *'
  workflow_dispatch:

# 1. Force the GitHub Actions runner to use Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 2. Update the Node version for your script to 24
          node-version: '24'

      - name: Generate Daily Log
        run: node generate-log.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Diary Bot"
          git add logs/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: auto-generate daily developer log [skip ci]"
            git push
          fi